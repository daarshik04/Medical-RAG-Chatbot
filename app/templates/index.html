<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🩺 AI Medical Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            color: #1a202c;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .chat-container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* Header */
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a56db;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #e67e22;
            background: #fef3e2;
            border: 1px solid #f6c47b;
            border-radius: 6px;
            padding: 6px 12px;
            margin-bottom: 1.2rem;
        }

        /* Chat box */
        #chat-box {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
            min-height: 200px;
            max-height: 480px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        /* Messages */
        .message {
            padding: 0.65rem 0.9rem;
            border-radius: 10px;
            font-size: 0.93rem;
            line-height: 1.6;
            white-space: pre-wrap;
            max-width: 88%;
        }

        .user {
            background: #dbeafe;
            color: #1e3a5f;
            align-self: flex-end;
            text-align: right;
        }

        .assistant {
            background: #f1f5f9;
            color: #1a202c;
            align-self: flex-start;
            border-left: 3px solid #1a56db;
        }

        .message strong {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: block;
            margin-bottom: 3px;
            opacity: 0.6;
        }

        /* Input form */
        form.input-form {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            height: 2.8rem;
            padding: 0.6rem 0.8rem;
            font-size: 0.95rem;
            font-family: inherit;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: #1a56db; }

        button[type="submit"] {
            padding: 0 1.2rem;
            height: 2.8rem;
            background: #1a56db;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        button[type="submit"]:hover { background: #1447b7; }

        /* Clear button */
        .clear-form { margin-top: 0.6rem; text-align: right; }

        .clear-btn {
            background: none;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            padding: 0.3rem 0.9rem;
            font-size: 0.82rem;
            font-family: inherit;
            color: #718096;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-btn:hover { border-color: #e53e3e; color: #e53e3e; }

        /* Error */
        .error {
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.88rem;
            margin-bottom: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="chat-container">

        <h1>🩺 AI Medical Chatbot</h1>
        <p class="subtitle">⚠️ For educational purposes only — always consult a licensed healthcare professional.</p>

        {% if error %}
            <p class="error">⛔ {{ error }}</p>
        {% endif %}

        <div id="chat-box">
            {% for msg in messages %}
                <div class="message {{ msg.role }}">
                    <strong>{{ msg.role | capitalize }}</strong>
                    {{ msg.content | safe }}
                </div>
            {% endfor %}
        </div>

        <form method="post" action="{{ url_for('index') }}" class="input-form">
            <textarea name="prompt" placeholder="Ask a medical question..." required></textarea>
            <button type="submit">Send</button>
        </form>

        <div class="clear-form">
            <form method="get" action="{{ url_for('clear') }}">
                <button type="submit" class="clear-btn">✕ Clear chat</button>
            </form>
        </div>

    </div>

    <script>
        // Auto-scroll chat to bottom on load
        const box = document.getElementById('chat-box');
        box.scrollTop = box.scrollHeight;
    </script>
</body>
</html>
